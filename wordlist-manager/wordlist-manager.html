<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordlist Manager</title>
<script>if(localStorage.getItem('wlm2_darkMode')==='0')document.documentElement.classList.add('light-mode');</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1e1e1e;
  --surface:   #282828;
  --surface2:  #232323;
  --border:    #525252;
  --border2:   #3e3e3e;
  --border3:   #3a3a3a;
  --text:      #e0e0e0;
  --muted:     #a0a0a0;
  --faint:     #6c6c6c;
  --hover:     #303030;
  --accent:      #7b6db8;
  --accent-hover:#6558a0;
  --sel:         #383838;
  --row-hover:   #2c2c2c;
  --input-bg:    #2e2e2e;
  --btn-bg:      #363636;
  --hdr-bg:      var(--accent);
  --error-bg:  #361818;
  --del-hover: #361818;
  --shadow:    0 8px 40px rgba(0,0,0,0.5);
  --backdrop:  rgba(0,0,0,0.5);
  --score-great-bg: #1e5230; --score-great-fg: #90e6b0;
  --score-good-bg:  #1a3a6b; --score-good-fg:  #8ec4fb;
  --score-ok-bg:    #4d4808; --score-ok-fg:    #f5e066;
  --score-bad-bg:   #6b1d1d; --score-bad-fg:   #f9a8a8;
}
html.light-mode {
  --bg:        #f5f5f5;
  --surface:   #ffffff;
  --surface2:  #fafafa;
  --border:    #dddddd;
  --border2:   #eeeeee;
  --border3:   #f0f0f0;
  --text:      #222222;
  --muted:     #888888;
  --faint:     #bbbbbb;
  --hover:     #f8f8f8;
  --sel:       #e8e8e8;
  --row-hover: #f0f0f0;
  --input-bg:  #ffffff;
  --btn-bg:    #ffffff;
  --error-bg:  #fff8f8;
  --del-hover: #fdecea;
  --shadow:    0 8px 40px rgba(0,0,0,0.18);
  --backdrop:  rgba(0,0,0,0.3);
  --score-great-bg: #d4edda; --score-great-fg: #155724;
  --score-good-bg:  #cce5ff; --score-good-fg:  #004085;
  --score-ok-bg:    #fff3cd; --score-ok-fg:    #856404;
  --score-bad-bg:   #f8d7da; --score-bad-fg:   #721c24;
}

body { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: var(--hdr-bg); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

main { display: flex; flex: 1; overflow: hidden; }

/* Lists panel */
#lists-panel { width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
#lists-panel h2 { padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border2); }
#lists-container { flex: 1; overflow-y: auto; }
/* #add-list-area removed — replaced by inline .add-list-row */
.add-list-row { padding: 9px 14px; cursor: pointer; color: var(--faint); font-size: 13px; display: flex; align-items: center; gap: 9px; transition: background 0.1s, color 0.1s; user-select: none; }
.add-list-row:hover { background: var(--hover); color: var(--accent); }
.add-list-icon { font-size: 15px; line-height: 1; width: 16px; text-align: center; flex-shrink: 0; }

/* List card */
.list-card { padding: 10px 14px; border-bottom: 1px solid var(--border3); cursor: default; display: flex; align-items: center; gap: 9px; transition: background 0.1s; }
.list-card:hover { background: var(--hover); }
.list-card.selected { background: var(--sel); border-left: 3px solid var(--accent); padding-left: 11px; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
.card-meta { color: var(--muted); font-size: 11px; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.card-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

/* Buttons */
button { font-size: 13px; padding: 5px 11px; border-radius: 4px; border: 1px solid var(--border); background: var(--btn-bg); color: var(--text); cursor: pointer; font-family: inherit; }
button:hover:not(:disabled) { background: var(--hover); }
button.primary { background: var(--accent); color: white; border-color: var(--accent); }
button.primary:hover:not(:disabled) { background: var(--accent-hover); }
button.small { font-size: 12px; padding: 2px 7px; }
button:disabled { opacity: 0.45; cursor: not-allowed; }
button.danger { background: #c0392b; color: white; border-color: #922b21; }
button.danger:hover:not(:disabled) { background: #e74c3c; border-color: #c0392b; }

/* Detail panel */
#detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.no-selection { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--faint); background: var(--bg); }
.no-selection p { font-size: 15px; margin-bottom: 6px; }
.no-selection small { font-size: 13px; }

.detail-header { background: var(--surface); padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.detail-header h2 { font-size: 15px; font-weight: 600; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: text; }
.detail-source { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

/* Stats bar */
.stats-bar { background: var(--surface2); border-bottom: 1px solid var(--border2); padding: 10px 18px; display: flex; align-items: center; gap: 22px; flex-shrink: 0; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 15px; font-weight: 700; line-height: 1; }
.score-dist { display: flex; gap: 3px; align-items: flex-end; height: 36px; }
.stats-right { display: flex; align-items: center; gap: 22px; margin-left: auto; }
.score-bar { width: 7px; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; }

/* Search */
.search-bar { padding: 7px 14px; background: var(--surface); border-bottom: 1px solid var(--border2); flex-shrink: 0; }
.search-bar input { width: 100%; padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); }
.search-bar input:focus { outline: none; border-color: var(--accent); }

/* Virtual scroll table */
#table-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--surface); }
#vs-host { flex: 1; min-height: 0; }
.word-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.word-table th { position: sticky; top: 0; background: var(--surface2); padding: 7px 16px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--border2); z-index: 1; cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; }
.word-table th:hover { background: var(--hover); }
.word-table td { padding: 0 16px; font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 13px; border-bottom: 1px solid var(--border3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.word-table td.comment-cell { font-family: inherit; font-size: 12px; color: var(--muted); }
.word-table tr:hover td { background: var(--row-hover); }
.vs-spacer td { padding: 0; border: none; }
.score-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 11px; font-weight: 700; }
.sort-arrow { font-size: 9px; opacity: 0.7; }
.col-resize-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; z-index: 2; }
.col-resize-handle:hover, .col-resize-handle.active { background: color-mix(in srgb, var(--accent) 35%, transparent); }

/* Inline name editing */
.detail-name-wrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
.detail-edit-hint { opacity: 0; font-size: 13px; transition: opacity 0.15s; flex-shrink: 0; cursor: pointer; }
.detail-name-wrap:hover .detail-edit-hint { opacity: 0.85; }
.detail-name-wrap:has(input) .detail-edit-hint { display: none; }
.name-edit-input { font-family: inherit; width: 100%; padding: 1px 5px; border: 1px solid var(--accent); border-radius: 3px; background: var(--input-bg); color: var(--text); font-size: 15px; font-weight: 600; outline: none; }
.card-name-edit { font-family: inherit; width: 100%; padding: 0 3px; border: 1px solid var(--accent); border-radius: 3px; background: var(--input-bg); color: var(--text); font-size: 13px; font-weight: 600; outline: none; }

/* Drag handle */
.drag-handle { color: var(--faint); cursor: grab; font-size: 13px; flex-shrink: 0; padding: 0 1px; user-select: none; }
.drag-handle:hover { color: var(--muted); }
.list-card[draggable]:active .drag-handle { cursor: grabbing; }
.list-card.dragging { opacity: 0.4; }
.list-card.drag-over { background: var(--sel) !important; box-shadow: inset 0 0 0 2px var(--accent); }

/* Toggle switch */
.toggle { position: relative; display: inline-block; width: 28px; height: 16px; flex-shrink: 0; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 16px; transition: background 0.2s; }
.toggle-slider::before { content: ''; position: absolute; height: 12px; width: 12px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-slider { background: var(--accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(12px); }

/* Dark mode toggle */
.dark-toggle-wrap { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; user-select: none; }

/* Settings button */
.header-icon-btn { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 19px; padding: 4px 8px; border-radius: 4px; cursor: pointer; line-height: 1; font-family: inherit; }
.header-icon-btn:hover { background: rgba(255,255,255,0.15); color: white; }

/* Settings dialog */
#settings-dialog { width: 340px; }
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 13px 0; border-bottom: 1px solid var(--border2); }
.settings-row:first-of-type { border-top: 1px solid var(--border2); margin-top: 4px; }
.settings-row-label { font-size: 13px; font-weight: 600; }
.settings-row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Disabled list */
.list-card.disabled .card-info { opacity: 0.45; }
.list-card.disabled .status { opacity: 0.45; }

/* No-data list */
.list-card.no-data .toggle { opacity: 0.35; }
.list-card.no-data .toggle input { pointer-events: none; }


/* Status dot */
.status { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status.loaded  { background: #34a853; }
.status.empty   { background: #dadce0; }
.status.loading { background: var(--accent); animation: pulse 1s infinite; }
.status.error   { background: #ea4335; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Upload zone */
.upload-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 24px 16px; text-align: center; color: var(--faint); cursor: pointer; transition: border-color 0.15s, color 0.15s; user-select: none; }
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); color: var(--accent); }

/* Dialog */
dialog { width: 420px; border-radius: 10px; border: none; box-shadow: var(--shadow); padding: 22px; font-family: system-ui, sans-serif; background: var(--surface); color: var(--text); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); max-height: 90vh; overflow-y: auto; }
dialog::backdrop { background: var(--backdrop); }
dialog h2 { font-size: 16px; margin-bottom: 14px; }
.tabs { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 16px; }
.tab-btn { flex: 1; border: none; border-radius: 0; padding: 7px; font-size: 12px; font-weight: 600; color: var(--muted); background: var(--btn-bg); cursor: pointer; }
.tab-btn + .tab-btn { border-left: 1px solid var(--border); }
.tab-btn.active { background: var(--sel); color: var(--accent); }
.tab-btn:hover:not(.active) { background: var(--hover); }
.form-field { margin-bottom: 10px; }
.form-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.form-field input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text); }
.form-field input:focus { outline: none; border-color: var(--accent); }
.builtin-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border: 1px solid var(--border2); border-radius: 6px; margin-bottom: 7px; }
.builtin-item-info { flex: 1; }
.builtin-item-name { font-size: 13px; font-weight: 600; }
.builtin-item-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.dialog-footer { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border2); display: flex; justify-content: flex-end; gap: 8px; }

/* Toast */
#toast { position: fixed; bottom: 18px; right: 18px; background: #333; color: white; padding: 9px 15px; border-radius: 6px; font-size: 13px; z-index: 1000; opacity: 0; transition: opacity 0.25s; pointer-events: none; max-width: 360px; }
#toast.show { opacity: 1; }

a.get-file { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }
a.get-file:hover { text-decoration: underline; }

/* ── Rescore section ──────────────────────────────────────────────────────── */
.rescore-section { background: var(--surface2); border-bottom: 1px solid var(--border2); padding: 9px 18px; flex-shrink: 0; max-height: 240px; overflow-y: auto; }
.rescore-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rescore-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.rule-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.rule-in  { width: 80px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: ui-monospace, 'Cascadia Code', monospace; text-align: center; background: var(--input-bg); color: var(--text); }
.rule-len { width: 60px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: ui-monospace, 'Cascadia Code', monospace; text-align: center; background: var(--input-bg); color: var(--text); }
.rule-out { width: 80px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; font-size: 12px; font-family: ui-monospace, 'Cascadia Code', monospace; text-align: center; background: var(--input-bg); color: var(--text); }
.rule-in:focus, .rule-len:focus, .rule-out:focus { outline: none; border-color: var(--accent); }
.rule-in.invalid, .rule-len.invalid, .rule-out.invalid { border-color: #ea4335; background: var(--error-bg); }
.rule-catchall { background: var(--surface); border-radius: 4px; }.rule-field-lbl { font-size: 10px; color: var(--faint); font-family: inherit; flex-shrink: 0; }
.rule-arrow { color: var(--faint); font-size: 14px; width: 14px; text-align: center; flex-shrink: 0; }
.rule-del { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border: none; background: none; cursor: pointer; color: var(--faint); font-size: 15px; padding: 0; line-height: 1; border-radius: 3px; font-family: inherit; }
.rule-del:hover { color: #e53935; background: var(--del-hover); }

/* Header */
.header-controls { display: flex; gap: 12px; align-items: center; }
.dark-toggle-wrap .toggle { margin: 0; }

/* Lists panel */
#list-count { font-weight: 400; color: var(--muted); }

/* Tabs — hidden until activated by JS */
#tab-upload, #tab-url { display: none; }

/* Empty states */
.no-lists { padding: 20px; color: var(--faint); text-align: center; font-size: 13px; }
.no-rules { font-size: 12px; color: var(--faint); font-style: italic; margin-bottom: 3px; }
.stats-bar.stats-empty { color: var(--muted); font-size: 13px; }

/* List icons */
.list-icon-img { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; display: block; }
.list-icon-svg { border-radius: 3px; flex-shrink: 0; }

/* Score display */
.score-orig { color: #aaa; font-size: 11px; }
.score-arrow-indicator { color: #ccc; font-size: 10px; padding: 0 3px; }
.excluded-word { text-decoration: line-through; }
.score-badge.excluded { text-decoration: line-through; }

/* Dialog helpers */
.dialog-actions { text-align: right; }
.form-field-gap { margin-top: 10px; }
.dialog-divider { text-align: center; color: var(--muted); font-size: 12px; margin: 12px 0; }
.subscription-note { background: #fff3cd; border: 1px solid #ffc107; border-radius: 5px; padding: 9px 12px; margin-bottom: 16px; font-size: 12px; color: #856404; }
.upload-zone.compact { padding: 16px; }
#guide-steps .builtin-item { margin-bottom: 12px; }

/* Hidden file inputs (triggered programmatically by their upload zones) */
input[type="file"] { display: none; }

/* Guide step upload zone spacing */
.guide-step-body .upload-zone { margin-top: 8px; }

/* Upload guide dialog */
#upload-guide-dialog { width: 660px; }
.guide-steps { display: flex; flex-direction: column; gap: 16px; }
.guide-step { display: flex; gap: 12px; align-items: flex-start; font-size: 13px; }
.guide-step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
.guide-step-body { flex: 1; }
.guide-step-body a.get-file { font-size: 13px; }
.screenshot-container { position: relative; margin-top: 8px; border: 1px solid var(--border2); border-radius: 4px; overflow: hidden; display: block; }
.screenshot-container img { display: block; width: 100%; }
.annotation { position: absolute; border: 3px solid #e53935; border-radius: 50px; pointer-events: none; box-shadow: 0 0 6px rgba(229,57,53,0.4); }
</style>
</head>
<body>

<header>
  <h1>Wordlist Manager</h1>
  <button id="btn-settings" class="header-icon-btn" title="Settings">⚙️</button>
</header>

<main>
  <div id="lists-panel">
    <h2>Lists <span id="list-count"></span></h2>
    <div id="lists-container"></div>
  </div>

  <div id="detail-panel">
    <div class="no-selection">
      <p>No list selected</p>
      <small>Select a list or click + Add List</small>
    </div>
  </div>
</main>

<div id="toast"></div>

<dialog id="settings-dialog">
  <h2>Settings</h2>
  <div class="settings-row">
    <span class="settings-row-label">Dark mode</span>
    <div class="dark-toggle-wrap">
      <span>☽</span>
      <label class="toggle" title="Toggle dark mode">
        <input type="checkbox" id="dark-mode-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  <div class="settings-row">
    <div>
      <div class="settings-row-label">Reset all data</div>
      <div class="settings-row-sub">Delete all lists and word data</div>
    </div>
    <button id="btn-reset" class="danger small" title="Delete all lists and data">🗑 Reset</button>
  </div>
  <div class="dialog-footer">
    <button id="btn-settings-close">Close</button>
  </div>
</dialog>

<dialog id="add-dialog">
  <h2>Add Wordlist</h2>
  <div class="tabs">
    <button class="tab-btn active" data-tab="builtin">Known Lists</button>
    <button class="tab-btn" data-tab="upload">Upload File</button>
    <button class="tab-btn" data-tab="url">From URL</button>
  </div>

  <div id="tab-builtin">
    <div id="builtin-list"></div>
  </div>

  <div id="tab-upload">
    <div class="upload-zone" id="drop-zone">
      Drop file here or click to browse
      <input type="file" id="file-input" accept=".txt,.csv">
    </div>
    <div class="form-field form-field-gap">
      <label>Name (optional)</label>
      <input type="text" id="upload-name" placeholder="My Wordlist">
    </div>
  </div>

  <div id="tab-url">
    <div class="form-field">
      <label>URL</label>
      <input type="text" id="url-input" placeholder="https://...">
    </div>
    <div class="form-field">
      <label>Name (optional)</label>
      <input type="text" id="url-name" placeholder="My Wordlist">
    </div>
    <div class="dialog-actions">
      <button class="primary" id="btn-fetch-url">Fetch</button>
    </div>
  </div>

  <div class="dialog-footer">
    <button id="btn-dialog-close">Close</button>
  </div>
</dialog>

<dialog id="upload-guide-dialog">
  <h2 id="guide-title"></h2>
  <div class="guide-steps" id="guide-steps"></div>
  <div class="dialog-footer">
    <button id="btn-guide-close">Cancel</button>
  </div>
</dialog>

<script>
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────

const ROW_HEIGHT   = 24;
const VS_BUFFER    = 60;
const LS_PREFIX    = 'wlm2_';

const BUILTIN_WORDLISTS = [
  {
    id: 'jkugelman',
    name: 'John Kugelman',
    source: 'builtin-download',
    url: 'https://raw.githubusercontent.com/jkugelman/crossword/refs/heads/main/wordlists/jkugelman-wordlist.txt',
    icon: `<svg width="16" height="16" viewBox="0 0 16 16" class="list-icon-svg" aria-hidden="true"><rect width="16" height="16" fill="#7b6db8"/><text x="8" y="12" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="8.5" font-weight="700">JK</text></svg>`,
    defaultRules: [],
  },
  {
    id: 'xwi',
    name: 'XWord Info',

// ─── State ────────────────────────────────────────────────────────────────────

const state = {
  lists: [],            // [{id, name, source, url, enabled, rawEntries, cachedAt, _loading}]
  selectedId: null,
  searchQuery: '',
};

// ─── Parsing ─────────────────────────────────────────────────────────────────

function parseWordlist(text) {
  const entries = [];
  for (const line of text.split('\n')) {
    if (!line) continue;
    const semi = line.indexOf(';');
    if (semi === -1) continue;
    const word = line.slice(0, semi);
    if (!word || !/^[A-Za-z]+$/.test(word)) continue;
    const rest = line.slice(semi + 1);
    const semi2 = rest.indexOf(';');
    const score = parseInt(semi2 === -1 ? rest : rest.slice(0, semi2), 10);
    if (isNaN(score)) continue;
    const comment = semi2 === -1 ? '' : rest.slice(semi2 + 1).trim();
    entries.push({ word, score, comment });
  }
  return entries;
}

// ─── Storage ──────────────────────────────────────────────────────────────────

function lsSave(key, value) {
  try { localStorage.setItem(LS_PREFIX + key, value); return true; }
  catch { return false; }
}
function lsLoad(key) { return localStorage.getItem(LS_PREFIX + key); }
function lsDel(key)  { localStorage.removeItem(LS_PREFIX + key); }

// IndexedDB for large word list data (localStorage has ~5MB limit)
const IDB_NAME  = 'wlm2';
const IDB_STORE = 'data';
let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _db = e.target.result; resolve(); };
    req.onerror   = () => reject(req.error);
  });
}

function idbPut(key, val) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function idbGet(key) {
  return new Promise(resolve => {
    const tx  = _db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result ?? null);
    req.onerror   = () => resolve(null);
  });
}

function idbDel(key) {
  return new Promise(resolve => {
    const tx = _db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

function persistMeta() {
  lsSave('meta', JSON.stringify(state.lists.map(l => ({
    id: l.id, name: l.name, source: l.source, url: l.url || null,
    enabled: l.enabled, cachedAt: l.cachedAt || null,
    rescoreRules: l.rescoreRules || [],
  }))));
}

async function persistData(id, text) {
  await idbPut('data_' + id, text);
}

// ─── Dark mode ────────────────────────────────────────────────────────────────

function initDarkMode() {
  const saved = lsLoad('darkMode');
  const dark = saved !== '0'; // default on
  document.documentElement.classList.toggle('light-mode', !dark);
  const toggle = document.getElementById('dark-mode-toggle');
  toggle.checked = dark;
  toggle.onchange = e => {
    const on = e.target.checked;
    document.documentElement.classList.toggle('light-mode', !on);
    lsSave('darkMode', on ? '1' : '0');
  };
}

// ─── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  await openDB();

  const raw = lsLoad('meta');
  if (raw) {
    try {
      const meta = JSON.parse(raw);
      state.lists = await Promise.all(meta.map(async m => {
        const text = await idbGet('data_' + m.id);
        const list = { ...m, rawEntries: text ? parseWordlist(text) : [], _loading: false,
                       rescoreRules: (m.rescoreRules || []).map(r => ({ length: '', ...r })) };
        updateCatchAll(list);
        return list;
      }));
    } catch { state.lists = defaultLists(); }
  } else {
    state.lists = defaultLists();
    persistMeta();
  }

  const savedId = lsLoad('selectedId');
  if (savedId && state.lists.some(l => l.id === savedId)) state.selectedId = savedId;
  if (!state.selectedId && state.lists.length) state.selectedId = state.lists[0].id;

  renderAll();
  bindEvents();
}

function defaultLists() {
  return BUILTIN_WORDLISTS.map(t => {
    const list = {
      ...t, enabled: true, rawEntries: [], cachedAt: null, _loading: false,
      rescoreRules: t.defaultRules ? JSON.parse(JSON.stringify(t.defaultRules)) : [],
    };
    updateCatchAll(list);
    return list;
  });
}

// ─── Stats ────────────────────────────────────────────────────────────────────

function computeStats(entries) {
  if (!entries.length) return null;
  let min = Infinity, max = -Infinity;
  const buckets = new Array(11).fill(0);
  const freq = {};
  const scores = [];
  for (const { score } of entries) {
    if (score < min) min = score;
    if (score > max) max = score;
    buckets[Math.min(10, Math.max(0, Math.floor(score / 10)))]++;
    scores.push(score);
    freq[score] = (freq[score] || 0) + 1;
  }
  scores.sort((a, b) => a - b);
  const mid = Math.floor(scores.length / 2);
  const median = scores.length % 2 === 0 ? (scores[mid - 1] + scores[mid]) / 2 : scores[mid];
  let mode = null, modeCount = 0;
  for (const [s, c] of Object.entries(freq)) {
    if (c > modeCount) { modeCount = c; mode = +s; }
  }
  const mean = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
  return { count: entries.length, min, max, mean, median, mode, buckets, maxBucket: Math.max(...buckets) };
}

// ─── Virtual Scroller ─────────────────────────────────────────────────────────

const colWidths = { word: 220, score: 130 }; // persists across list switches

class VirtualScroller {
  constructor(container) {
    this.container = container;
    this.allEntries = [];
    this.entries = [];
    this.hasComments = false;
    this.sortKey = null;
    this.sortDir = 'asc';
    this._lastQuery = '';
    this._colEls = {};
    this.rescoreRules = [];
    this._currentCols = [];

    container.style.overflowY = 'auto';

    this.table = document.createElement('table');
    this.table.className = 'word-table';

    this.colgroup = document.createElement('colgroup');
    this.table.appendChild(this.colgroup);

    const thead = document.createElement('thead');
    this.theadRow = document.createElement('tr');
    thead.appendChild(this.theadRow);
    this.table.appendChild(thead);

    this.tbody = document.createElement('tbody');
    this.table.appendChild(this.tbody);

    this.topRow = document.createElement('tr');
    this.topRow.className = 'vs-spacer';
    this.topRow.innerHTML = '<td colspan="2"></td>';
    this.botRow = document.createElement('tr');
    this.botRow.className = 'vs-spacer';
    this.botRow.innerHTML = '<td colspan="2"></td>';
    this.tbody.appendChild(this.topRow);
    this.tbody.appendChild(this.botRow);

    container.appendChild(this.table);
    container.addEventListener('scroll', () => this._render(), { passive: true });
    new ResizeObserver(() => this._render()).observe(container);
  }

  setEntries(allEntries, query, rescoreRules) {
    this.allEntries = allEntries;
    this.hasComments = allEntries.some(e => e.comment);
    this.rescoreRules = rescoreRules || [];
    this.sortKey = null;
    this.sortDir = 'asc';
    this._buildHeader();
    this.filter(query);
  }

  setRescore(rules) {
    this.rescoreRules = rules || [];
    this._buildHeader();
    this._applyFilterAndSort(false);
  }

  _cols() {
    return ['word', 'score', 'comment'];
  }

  _buildHeader() {
    const LABELS = { word: 'Word', score: 'Score', comment: 'Comment' };
    const ALIGN  = { word: 'left', score: 'left', comment: 'left' };
    const cols = this._cols();
    this._currentCols = cols;

    this.topRow.firstElementChild.colSpan = cols.length;
    this.botRow.firstElementChild.colSpan = cols.length;

    this.colgroup.innerHTML = '';
    this._colEls = {};
    for (const key of cols) {
      const col = document.createElement('col');
      if (colWidths[key] != null) col.style.width = colWidths[key] + 'px';
      this.colgroup.appendChild(col);
      this._colEls[key] = col;
    }

    this.theadRow.innerHTML = '';
    for (let i = 0; i < cols.length; i++) {
      const key = cols[i];
      const isLast = i === cols.length - 1;
      const th = document.createElement('th');
      th.style.textAlign = ALIGN[key];

      const isFillerComment = key === 'comment' && !this.hasComments;

      if (!isFillerComment) {
        const labelSpan = document.createElement('span');
        labelSpan.textContent = LABELS[key];
        th.appendChild(labelSpan);

        if (this.sortKey === key) {
          const arrow = document.createElement('span');
          arrow.className = 'sort-arrow';
          arrow.textContent = this.sortDir === 'asc' ? ' ▲' : ' ▼';
          th.appendChild(arrow);
        }

        th.addEventListener('click', e => {
          if (e.target.classList.contains('col-resize-handle')) return;
          if (this.sortKey === key) {
            this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            this.sortKey = key;
            this.sortDir = (key === 'score') ? 'desc' : 'asc';
          }
          this._buildHeader();
          this._applyFilterAndSort();
        });
      }

      if (!isLast && !isFillerComment) {
        const handle = document.createElement('div');
        handle.className = 'col-resize-handle';
        th.appendChild(handle);

        handle.addEventListener('mousedown', e => {
          e.preventDefault();
          e.stopPropagation();
          const colEl = this._colEls[key];
          const startX = e.clientX;
          const startW = th.offsetWidth;
          handle.classList.add('active');
          const onMove = mv => {
            const w = Math.max(50, startW + mv.clientX - startX);
            colEl.style.width = w + 'px';
            colWidths[key] = w;
          };
          const onUp = () => {
            handle.classList.remove('active');
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

      this.theadRow.appendChild(th);
    }
  }

  filter(query) {
    this._lastQuery = query || '';
    this._applyFilterAndSort();
  }

  _applyFilterAndSort(resetScroll = true) {
    const q = this._lastQuery.toLowerCase();
    let entries = q
      ? this.allEntries.filter(e => e.word.toLowerCase().includes(q))
      : this.allEntries;

    if (this.sortKey) {
      const key = this.sortKey;
      const dir = this.sortDir === 'asc' ? 1 : -1;
      entries = [...entries].sort((a, b) => {
        if (key === 'score' && this.rescoreRules.length) {
          const ar = rescoreEntry(a, this.rescoreRules);
          const br = rescoreEntry(b, this.rescoreRules);
          return dir * ((ar.kept ? ar.score : -1) - (br.kept ? br.score : -1));
        }
        const av = a[key] ?? '';
        const bv = b[key] ?? '';
        if (typeof av === 'number' && typeof bv === 'number') return dir * (av - bv);
        return dir * String(av).localeCompare(String(bv));
      });
    }

    this.entries = entries;
    if (resetScroll) this.container.scrollTop = 0;
    this._render();
  }

  _render() {
    const n = this.entries.length;
    const scrollTop = this.container.scrollTop;
    const viewH = this.container.clientHeight;

    const start = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - VS_BUFFER);
    const end   = Math.min(n, Math.ceil((scrollTop + viewH) / ROW_HEIGHT) + VS_BUFFER);

    this.topRow.firstElementChild.style.height = (start * ROW_HEIGHT) + 'px';
    this.botRow.firstElementChild.style.height = ((n - end) * ROW_HEIGHT) + 'px';

    while (this.topRow.nextSibling !== this.botRow) {
      this.tbody.removeChild(this.topRow.nextSibling);
    }

    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const entry = this.entries[i];
      const { word, score, comment } = entry;
      const { bg, fg } = scoreColor(score);
      const tr = document.createElement('tr');
      tr.style.height = ROW_HEIGHT + 'px';

      let wordCell  = `<td>${word}</td>`;
      let scoreCell = `<td><span class="score-badge" style="background:${bg};color:${fg}">${score}</span></td>`;

      if (this.rescoreRules.length) {
        const r = rescoreEntry(entry, this.rescoreRules);
        if (!r.kept) {
          tr.style.opacity = '0.4';
          wordCell  = `<td><span class="excluded-word">${word}</span></td>`;
          scoreCell = `<td><span class="score-badge excluded" style="background:${bg};color:${fg}">${score}</span></td>`;
        } else if (r.score !== score) {
          const { bg: rb, fg: rf } = scoreColor(r.score);
          const orig = `<span class="score-orig">${score}</span><span class="score-arrow-indicator">→</span>`;
          scoreCell = `<td>${orig}<span class="score-badge" style="background:${rb};color:${rf}">${r.score}</span></td>`;
        }
      }

      tr.innerHTML =
        wordCell +
        scoreCell +
        `<td class="comment-cell">${comment || ''}</td>`;
      frag.appendChild(tr);
    }
    this.tbody.insertBefore(frag, this.botRow);
  }
}

function scoreColor(s) {
  if (s >= 60) return { bg: 'var(--score-great-bg)', fg: 'var(--score-great-fg)' };
  if (s >= 50) return { bg: 'var(--score-good-bg)',  fg: 'var(--score-good-fg)' };
  if (s >= 30) return { bg: 'var(--score-ok-bg)',    fg: 'var(--score-ok-fg)' };
  return        { bg: 'var(--score-bad-bg)',  fg: 'var(--score-bad-fg)' };
}

// ─── Rescoring ────────────────────────────────────────────────────────────────

function parseRange(str) {
  str = (str || '').trim();
  if (!str || str === '*') return [{ min: null, max: null }];
  const parts = str.split(',').map(s => s.trim()).filter(Boolean);
  if (!parts.length) return null;
  const intervals = [];
  for (const part of parts) {
    const mPlus  = part.match(/^(\d+)\+$/);        if (mPlus)  { intervals.push({ min: +mPlus[1],  max: null });            continue; }
    const mRange = part.match(/^(\d+)[-–](\d+)$/); if (mRange) { intervals.push({ min: +mRange[1], max: +mRange[2] });       continue; }
    const mExact = part.match(/^(\d+)$/);           if (mExact) { intervals.push({ min: +mExact[1], max: +mExact[1] });       continue; }
    return null;
  }
  return intervals.length ? intervals : null;
}

function matchesRange(value, intervals) {
  for (const { min, max } of intervals) {
    if ((min === null || value >= min) && (max === null || value <= max)) return true;
  }
  return false;
}

function scoresToRangeStr(scores) {
  if (!scores.length) return '';
  const sorted = [...scores].sort((a, b) => a - b);
  // Build exact disjoint representation (compresses consecutive runs)
  const ranges = [];
  let start = sorted[0], end = sorted[0];
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] === end + 1) { end = sorted[i]; }
    else { ranges.push(start === end ? `${start}` : `${start}-${end}`); start = end = sorted[i]; }
  }
  ranges.push(start === end ? `${start}` : `${start}-${end}`);
  const exact = ranges.join(',');
  // Compare with a simple min-max span — pick whichever string is shorter
  const min = sorted[0], max = sorted[sorted.length - 1];
  const span = min === max ? `${min}` : `${min}-${max}`;
  return span.length <= exact.length ? span : exact;
}

function getRuleMaxScore(rule) {
  const intervals = parseRange(rule.input);
  if (!intervals) return -1;
  let max = -Infinity;
  for (const { max: imax } of intervals) {
    const m = imax === null ? Infinity : imax;
    if (m > max) max = m;
  }
  return max;
}

function outputSortKey(rule) {
  const s = parseRuleOutput(rule.output);
  if (typeof s === 'number') return s;
  if (s === 'exclude') return -1;
  return -2; // 'unchanged' sorts last
}

function rulesSig(rules) {
  return rules.map(r => `${r.input}|${r.length}|${r.output}|${r._catchAll ? 1 : 0}`).join(';');
}

function updateCatchAll(list) {
  const rules = list.rescoreRules;
  const before = rulesSig(rules);

  // Remove existing auto catch-all
  const caIdx = rules.findIndex(r => r._catchAll);
  if (caIdx !== -1) rules.splice(caIdx, 1);

  // Sort user rules: primary = output score descending, then input score, then length
  rules.sort((a, b) => {
    const ao = outputSortKey(a), bo = outputSortKey(b);
    if (ao !== bo) return bo - ao;
    const am = getRuleMaxScore(a), bm = getRuleMaxScore(b);
    if (am !== bm) return bm - am;
    const aL = !!(a.length && a.length.trim()), bL = !!(b.length && b.length.trim());
    return (aL ? 0 : 1) - (bL ? 0 : 1);
  });

  // Find actual scores in the data not covered by any length-filter-free rule
  const actualScores = list.rawEntries && list.rawEntries.length
    ? [...new Set(list.rawEntries.map(e => e.score))].sort((a, b) => a - b)
    : [];
  const uncovered = actualScores.filter(s => !rules.some(r => {
    if (r.length && r.length.trim()) return false;
    const intervals = parseRange(r.input);
    return intervals && matchesRange(s, intervals);
  }));

  if (uncovered.length > 0) {
    rules.push({ input: scoresToRangeStr(uncovered), length: '', output: '', _catchAll: true });
  }
  return rulesSig(rules) !== before;
}

function parseRuleOutput(str) {
  str = (str || '').trim().toLowerCase();
  if (!str || str === 'unchanged') return 'unchanged';
  if (str === 'exclude' || str === 'x') return 'exclude';
  const n = parseInt(str, 10);
  return isNaN(n) ? null : n;
}

function applyRescoring(entries, rules) {
  const result = [];
  for (const entry of entries) {
    let out = entry;
    for (const rule of rules) {
      const scoreIntervals = parseRange(rule.input);
      if (!scoreIntervals || !matchesRange(entry.score, scoreIntervals)) continue;
      if (rule.length && rule.length.trim()) {
        const lenIntervals = parseRange(rule.length);
        if (!lenIntervals || !matchesRange(entry.word.length, lenIntervals)) continue;
      }
      const s = parseRuleOutput(rule.output);
      if (s === null) continue;
      if (s === 'exclude') { out = null; }
      else if (s !== 'unchanged') { out = { ...entry, score: s }; }
      break;
    }
    if (out !== null) result.push(out);
  }
  return result;
}

function rescoreEntry(entry, rules) {
  for (const rule of rules) {
    const scoreIntervals = parseRange(rule.input);
    if (!scoreIntervals || !matchesRange(entry.score, scoreIntervals)) continue;
    if (rule.length && rule.length.trim()) {
      const lenIntervals = parseRange(rule.length);
      if (!lenIntervals || !matchesRange(entry.word.length, lenIntervals)) continue;
    }
    const s = parseRuleOutput(rule.output);
    if (s === null) continue;
    if (s === 'exclude') return { kept: false };
    if (s === 'unchanged') return { kept: true, score: entry.score };
    return { kept: true, score: s };
  }
  return { kept: true, score: entry.score };
}

function buildRescoreSectionHTML(list) {
  if (!list) return '';
  const rules = list.rescoreRules || [];

  const rulesHTML = rules.length
    ? rules.map((r, i) => {
        const isCatchAll = !!r._catchAll;
        return `<div class="rule-row${isCatchAll ? ' rule-catchall' : ''}" data-i="${i}">
          <input class="rule-in" value="${esc(r.input)}" placeholder="60-100"
            title="Score range: 60+, 50-59, 42, *, or comma-separated like 50-59,30,1-10"
            oninput="onRescoreInput()" onchange="saveRuleField(${i},'input',this.value)">
          <span class="rule-field-lbl">length</span><input class="rule-len" value="${esc(r.length||'')}" placeholder="any"
            title="Word length filter: 7, 7+, or 7-10 (blank = any length)"
            oninput="onRescoreInput()" onchange="saveRuleField(${i},'length',this.value)">
          <span class="rule-arrow">→</span>
          <input class="rule-out" value="${esc(r.output)}" placeholder="unchanged"
            title="Output score, 'exclude', or blank for unchanged"
            oninput="onRescoreInput()" onchange="saveRuleField(${i},'output',this.value)">
          ${isCatchAll ? '' : `<button class="rule-del" onclick="deleteRule(${i})" title="Remove rule">×</button>`}
        </div>`;
      }).join('')
    : `<div class="no-rules">No rules — words kept as-is</div>`;

  return `
    <div class="rescore-top">
      <span class="rescore-lbl">Rescoring</span>
    </div>
    <div id="rescore-rules">${rulesHTML}</div>
  `;
}

function renderRescoreSection() {
  const el = document.getElementById('rescore-section');
  if (el) el.innerHTML = buildRescoreSectionHTML(getSelected());
}

// ─── Rendering ────────────────────────────────────────────────────────────────

let scroller = null;

function renderAll() {
  renderLists();
  renderDetail(getSelected());
}

function renderLists() {
  const container = document.getElementById('lists-container');
  document.getElementById('list-count').textContent =
    state.lists.length ? `(${state.lists.length})` : '';

  const addRow = `<div class="add-list-row" onclick="openDialog()"><span class="drag-handle" style="visibility:hidden" aria-hidden="true">≡</span><span class="add-list-icon">+</span>Add list</div>`;

  if (!state.lists.length) {
    container.innerHTML = '<div class="no-lists">No lists yet</div>' + addRow;
    return;
  }

  container.innerHTML = state.lists.map(list => {
    const sel = list.id === state.selectedId;
    const hasData = list.rawEntries.length > 0;
    const dot = list._loading ? 'loading' : hasData ? 'loaded' : 'empty';
    const meta = hasData
      ? `${list.rawEntries.length.toLocaleString()} entries`
        + (list.cachedAt ? ' · ' + new Date(list.cachedAt).toLocaleDateString() : '')
      : 'No data';

    const icon = getListIcon(list.id);

    const toggleTitle = !hasData ? 'Click to upload' : list.enabled ? 'Enabled — click to disable' : 'Disabled — click to enable';
    const toggleClick = hasData ? 'event.stopPropagation()' : `triggerLoadForList('${list.id}',event)`;
    return `<div class="list-card${sel ? ' selected' : ''}${list.enabled ? '' : ' disabled'}${hasData ? '' : ' no-data'}" data-id="${list.id}" draggable="true" onclick="selectList('${list.id}')">
      <span class="drag-handle" title="Drag to reorder">≡</span>
      ${icon}
      <div class="card-info">
        <div class="card-name">${esc(list.name)}</div>
        <div class="card-meta"><span class="status ${dot}"></span>${meta}</div>
      </div>
      <div class="card-actions">
        <label class="toggle" onclick="${toggleClick}" title="${toggleTitle}">
          <input type="checkbox"${hasData && list.enabled ? ' checked' : ''}${hasData ? '' : ' disabled'} onchange="toggleList('${list.id}',event)">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>`;
  }).join('') + addRow;
}

function renderDetail(list) {
  const panel = document.getElementById('detail-panel');

  if (!list) {
    panel.innerHTML = '<div class="no-selection"><p>No list selected</p><small>Select a list from the left panel</small></div>';
    scroller = null;
    return;
  }

  const stats = computeStats(list.rawEntries);

  let statsHtml;
  if (stats) {
    const bars = stats.buckets.map((b, i) => {
      const h = stats.maxBucket ? Math.max(2, Math.round((b / stats.maxBucket) * 34)) : 2;
      return `<div class="score-bar" style="height:${h}px" title="${i*10}–${i===10?'100':i*10+9}: ${b.toLocaleString()}"></div>`;
    }).join('');
    statsHtml = `<div class="stats-bar">
      <div class="stat"><span class="stat-label">Entries</span><span class="stat-value">${stats.count.toLocaleString()}</span></div>
      <div class="stat"><span class="stat-label">Min</span><span class="stat-value">${stats.min}</span></div>
      <div class="stat"><span class="stat-label">Max</span><span class="stat-value">${stats.max}</span></div>
      <div class="stats-right">
        <div class="stat" title="Average score"><span class="stat-label">Mean</span><span class="stat-value">${stats.mean}</span></div>
        <div class="stat" title="50th percentile score"><span class="stat-label">Median</span><span class="stat-value">${stats.median % 1 === 0 ? stats.median : stats.median.toFixed(1)}</span></div>
        <div class="stat" title="Most common score"><span class="stat-label">Mode</span><span class="stat-value">${stats.mode}</span></div>
        <div class="score-dist" title="Score distribution by decile">${bars}</div>
      </div>
    </div>`;
  } else {
    statsHtml = `<div class="stats-bar stats-empty">No data loaded — use the Upload button to load this list</div>`;
  }

  let sourceDesc, actionBtn;
  const hasData = list.rawEntries.length > 0;
  if (list.source === 'upload') {
    const tmpl = getTemplate(list.id);
    const label = hasData ? '↻ Update' : '↑ Upload';
    if (tmpl?.downloadPage) {
      sourceDesc = 'Manual upload required';
      actionBtn = `<button class="primary" onclick="openUploadGuide('${list.id}')">${label}</button>`;
    } else {
      sourceDesc = 'Manual upload';
      actionBtn = `<button class="primary" onclick="uploadToList('${list.id}')">${label}</button>`;
    }
  } else if (list.source === 'builtin-download' && list.url) {
    sourceDesc = hasData ? list.url : 'Auto-download available';
    const label = hasData ? '↻ Update' : '↑ Upload';
    actionBtn = `<button class="primary" onclick="openAutoDownloadDialog('${list.id}')" ${list._loading ? 'disabled' : ''}>${list._loading ? 'Updating…' : label}</button>`;
  } else if (list.url) {
    sourceDesc = list.url;
    actionBtn = `<button class="primary" onclick="downloadList('${list.id}')" ${list._loading ? 'disabled' : ''}>${list._loading ? 'Updating…' : '↻ Update'}</button>`;
  } else {
    sourceDesc = 'URL not yet configured';
    actionBtn = '';
  }

  const clearBtn = hasData
    ? `<button onclick="clearListData('${list.id}')">Clear data</button>`
    : `<button onclick="deleteList('${list.id}')">Remove</button>`;

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-name-wrap">
        <h2 onclick="startHeaderRename()" title="Click to rename">${esc(list.name)}</h2>
        <span class="detail-edit-hint" onclick="startHeaderRename()">✏️</span>
      </div>
      <span class="detail-source" title="${esc(sourceDesc)}">${esc(sourceDesc)}</span>
      ${actionBtn}
      ${clearBtn}
    </div>
    ${statsHtml}
    <div id="rescore-section" class="rescore-section">${buildRescoreSectionHTML(list)}</div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search words…" value="${esc(state.searchQuery)}" oninput="onSearch(this.value)">
    </div>
    <div id="table-container">
      <div id="vs-host"></div>
    </div>
  `;

  const host = document.getElementById('vs-host');
  scroller = new VirtualScroller(host);
  scroller.setEntries(list.rawEntries, state.searchQuery, list.rescoreRules);
}

// ─── Actions ──────────────────────────────────────────────────────────────────

function getSelected() {
  return state.lists.find(l => l.id === state.selectedId) || null;
}

function selectList(id) {
  state.selectedId = id;
  lsSave('selectedId', id);
  state.searchQuery = '';
  renderLists();
  renderDetail(getSelected());
}

function onSearch(query) {
  state.searchQuery = query;
  if (scroller) scroller.filter(query);
}

async function downloadList(id, event) {
  if (event) event.stopPropagation();
  const list = state.lists.find(l => l.id === id);
  if (!list || !list.url || list._loading) return;

  list._loading = true;
  renderLists();
  if (state.selectedId === id) renderDetail(list);
  showToast(`Downloading ${list.name}…`);

  try {
    const resp = await fetch(list.url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
    const text = await resp.text();

    const wasEmpty = !list.rawEntries.length;
    list.rawEntries = parseWordlist(text);
    list.cachedAt = Date.now();
    list._loading = false;
    if (wasEmpty) list.enabled = true;
    updateCatchAll(list);

    await persistData(id, text);
    persistMeta();

    renderLists();
    if (state.selectedId === id) renderDetail(list);
    showToast(`Loaded ${list.rawEntries.length.toLocaleString()} entries from ${list.name}`);
  } catch (err) {
    list._loading = false;
    renderLists();
    if (state.selectedId === id) renderDetail(list);
    showToast(`Download failed: ${err.message}`);
  }
}

function triggerLoadForList(id, event) {
  if (event) event.stopPropagation();
  const list = state.lists.find(l => l.id === id);
  if (!list) return;
  if (list.source === 'upload') {
    openUploadGuide(id);
  } else if (list.source === 'builtin-download') {
    openAutoDownloadDialog(id);
  }
}

function uploadToList(id, event) {
  if (event) event.stopPropagation();
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,.csv';
  input.onchange = () => { if (input.files[0]) ingestFile(input.files[0], id); };
  input.click();
}

function ingestFile(file, listId, nameOverride) {
  const reader = new FileReader();
  reader.onload = async e => {
    const text = e.target.result;
    const list = state.lists.find(l => l.id === listId);
    if (!list) return;

    const wasEmpty = !list.rawEntries.length;
    if (nameOverride) list.name = nameOverride;
    list.rawEntries = parseWordlist(text);
    list.cachedAt = Date.now();
    if (wasEmpty) list.enabled = true;
    updateCatchAll(list);

    await persistData(listId, text);
    persistMeta();

    renderLists();
    if (state.selectedId === listId) renderDetail(list);
    showToast(`Loaded ${list.rawEntries.length.toLocaleString()} entries`);
  };
  reader.readAsText(file);
}

async function clearListData(id, event) {
  if (event) event.stopPropagation();
  const list = state.lists.find(l => l.id === id);
  if (!list || !list.rawEntries.length) return;
  if (!confirm(`Clear data for "${list.name}"?`)) return;
  list.rawEntries = [];
  list.cachedAt = null;
  await idbDel('data_' + id);
  persistMeta();
  renderLists();
  if (state.selectedId === id) renderDetail(list);
}

async function deleteList(id, event) {
  if (event) event.stopPropagation();
  const list = state.lists.find(l => l.id === id);
  if (!list) return;
  if (!confirm(`Remove "${list.name}"?`)) return;
  state.lists = state.lists.filter(l => l.id !== id);
  await idbDel('data_' + id);
  persistMeta();
  if (state.selectedId === id) {
    state.selectedId = null;
    lsSave('selectedId', '');
    scroller = null;
  }
  renderAll();
}

function toggleList(id, event) {
  if (event) event.stopPropagation();
  const list = state.lists.find(l => l.id === id);
  if (!list || !list.rawEntries.length) return;
  list.enabled = !list.enabled;
  persistMeta();
  renderLists();
}

function addNewList(listDef) {
  const list = { rescoreRules: [], ...listDef, rawEntries: [], cachedAt: null, _loading: false };
  updateCatchAll(list);
  state.lists.push(list);
  persistMeta();
  renderLists();
}

// ─── Add Dialog ───────────────────────────────────────────────────────────────

function openDialog() {
  const bl = document.getElementById('builtin-list');
  bl.innerHTML = BUILTIN_WORDLISTS.map(t => {
    const exists = state.lists.some(l => l.id === t.id);
    const sub = t.source === 'upload'
      ? (t.downloadPage
        ? `Manual download &middot; <a class="get-file" href="${esc(t.downloadPage)}" target="_blank" rel="noopener">Get file 🔗</a>`
        : 'Manual upload')
      : t.url ? 'Auto-download'
      : 'URL TBD';
    return `<div class="builtin-item">
      <div class="builtin-item-info">
        <div class="builtin-item-name">${esc(t.name)}</div>
        <div class="builtin-item-sub">${sub}</div>
      </div>
      <button class="small${exists ? '' : ' primary'}" ${exists ? 'disabled' : ''} onclick="addBuiltin('${t.id}')">
        ${exists ? 'Added' : '+ Add'}
      </button>
    </div>`;
  }).join('');

  document.getElementById('url-input').value = '';
  document.getElementById('url-name').value = '';
  document.getElementById('upload-name').value = '';

  const allAdded = BUILTIN_WORDLISTS.every(t => state.lists.some(l => l.id === t.id));
  const defaultTab = allAdded ? 'upload' : 'builtin';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === defaultTab));
  ['builtin', 'upload', 'url'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === defaultTab ? 'block' : 'none';
  });

  document.getElementById('add-dialog').showModal();
}

function addBuiltin(id) {
  if (state.lists.some(l => l.id === id)) return;
  const t = BUILTIN_WORDLISTS.find(t => t.id === id);
  if (!t) return;
  addNewList({
    id: t.id, name: t.name, source: t.source, url: t.url || null, enabled: true,
    rescoreRules: t.defaultRules ? JSON.parse(JSON.stringify(t.defaultRules)) : [],
  });
  document.getElementById('add-dialog').close();
  showToast(`Added ${t.name}`);
}

// ─── Event wiring ─────────────────────────────────────────────────────────────

function bindEvents() {
  document.getElementById('btn-reset').onclick = async () => {
    if (!confirm('Delete all lists and data? This cannot be undone.')) return;
    localStorage.clear();
    if (_db) { _db.close(); _db = null; }
    await new Promise(resolve => {
      const req = indexedDB.deleteDatabase(IDB_NAME);
      req.onsuccess = resolve;
      req.onerror   = resolve;
      req.onblocked = resolve;
    });
    state.lists = [];
    state.selectedId = null;
    state.searchQuery = '';
    scroller = null;
    await openDB();
    state.lists = defaultLists();
    persistMeta();
    state.selectedId = state.lists[0]?.id ?? null;
    renderAll();
    showToast('Reset complete');
  };

  document.getElementById('btn-settings').onclick       = () => document.getElementById('settings-dialog').showModal();
  document.getElementById('btn-settings-close').onclick = () => document.getElementById('settings-dialog').close();
  document.getElementById('btn-dialog-close').onclick   = () => document.getElementById('add-dialog').close();
  document.getElementById('btn-guide-close').onclick    = () => document.getElementById('upload-guide-dialog').close();

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['builtin','upload','url'].forEach(t => {
        document.getElementById('tab-' + t).style.display = btn.dataset.tab === t ? 'block' : 'none';
      });
    };
  });

  // Drop zone
  const zone  = document.getElementById('drop-zone');
  const finput = document.getElementById('file-input');
  zone.onclick     = () => finput.click();
  zone.ondragover  = e => { e.preventDefault(); zone.classList.add('drag-over'); };
  zone.ondragleave = () => zone.classList.remove('drag-over');
  zone.ondrop      = e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleDialogUpload(file);
  };
  finput.onchange  = () => { if (finput.files[0]) handleDialogUpload(finput.files[0]); };

  // Drag-to-reorder
  let _dragId = null;
  const listsContainer = document.getElementById('lists-container');

  listsContainer.addEventListener('dragstart', e => {
    const card = e.target.closest('.list-card');
    if (!card) return;
    _dragId = card.dataset.id;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', _dragId);
    setTimeout(() => card.classList.add('dragging'), 0);
  });

  listsContainer.addEventListener('dragend', () => {
    document.querySelectorAll('.list-card.dragging, .list-card.drag-over')
      .forEach(el => el.classList.remove('dragging', 'drag-over'));
    _dragId = null;
  });

  listsContainer.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('.list-card');
    if (!card || card.dataset.id === _dragId) return;
    document.querySelectorAll('.list-card.drag-over').forEach(el => el.classList.remove('drag-over'));
    card.classList.add('drag-over');
  });

  listsContainer.addEventListener('dragleave', e => {
    const card = e.target.closest('.list-card');
    if (card && !card.contains(e.relatedTarget)) card.classList.remove('drag-over');
  });

  listsContainer.addEventListener('drop', e => {
    e.preventDefault();
    const card = e.target.closest('.list-card');
    const toId = card?.dataset.id;
    if (!_dragId || !toId || _dragId === toId) return;
    const fromIdx = state.lists.findIndex(l => l.id === _dragId);
    const toIdx   = state.lists.findIndex(l => l.id === toId);
    if (fromIdx === -1 || toIdx === -1) return;
    const [item] = state.lists.splice(fromIdx, 1);
    state.lists.splice(toIdx, 0, item);
    persistMeta();
    renderLists();
  });

  // F2 to rename selected list
  document.addEventListener('keydown', e => {
    if (e.key !== 'F2') return;
    const active = document.activeElement;
    if (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA') return;
    if (state.selectedId) { e.preventDefault(); startCardRename(state.selectedId); }
  });

  // URL fetch
  document.getElementById('btn-fetch-url').onclick = async () => {
    const url  = document.getElementById('url-input').value.trim();
    const name = document.getElementById('url-name').value.trim();
    if (!url) { document.getElementById('url-input').focus(); return; }
    const id = 'url_' + Date.now();
    addNewList({ id, name: name || url.split('/').pop() || 'Custom List', source: 'url', url, enabled: true });
    document.getElementById('add-dialog').close();
    await downloadList(id);
    selectList(id);
  };
}

function handleDialogUpload(file) {
  const id   = 'up_' + Date.now();
  const name = document.getElementById('upload-name').value.trim() || file.name.replace(/\.[^.]+$/, '');
  addNewList({ id, name, source: 'upload', url: null, enabled: true });
  document.getElementById('add-dialog').close();
  ingestFile(file, id, name);
  selectList(id);
}

// ─── Utility ──────────────────────────────────────────────────────────────────

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ─── Template lookup ──────────────────────────────────────────────────────────

function getTemplate(id) {
  return BUILTIN_WORDLISTS.find(t => t.id === id) ?? null;
}

// ─── List icons ───────────────────────────────────────────────────────────────

function getListIcon(id) {
  return BUILTIN_WORDLISTS.find(w => w.id === id)?.icon ?? '';
}

// ─── Upload Guide ─────────────────────────────────────────────────────────────

function openUploadGuide(listId, event) {
  if (event) event.stopPropagation();
  const tmpl = getTemplate(listId);
  if (!tmpl?.downloadPage) { uploadToList(listId); return; }

  const dialog = document.getElementById('upload-guide-dialog');
  document.getElementById('guide-title').textContent = `${tmpl.name} — Where to get it`;
  document.getElementById('guide-steps').innerHTML = buildGuideHTML(listId, tmpl);

  const zone   = document.getElementById('guide-drop-zone');
  const finput = document.getElementById('guide-file-input');
  zone.onclick     = () => finput.click();
  zone.ondragover  = e => { e.preventDefault(); zone.classList.add('drag-over'); };
  zone.ondragleave = () => zone.classList.remove('drag-over');
  zone.ondrop      = e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) { dialog.close(); ingestFile(file, listId); selectList(listId); }
  };
  finput.onchange = () => {
    if (finput.files[0]) { dialog.close(); ingestFile(finput.files[0], listId); selectList(listId); }
  };

  dialog.showModal();
}

function openAutoDownloadDialog(listId, event) {
  if (event) event.stopPropagation();
  const tmpl = getTemplate(listId);
  const dialog = document.getElementById('upload-guide-dialog');
  document.getElementById('guide-title').textContent = `${tmpl?.name ?? 'Wordlist'} — Load Wordlist`;
  document.getElementById('guide-steps').innerHTML = `
    <div class="builtin-item">
      <div class="builtin-item-info">
        <div class="builtin-item-name">Auto-download</div>
        <div class="builtin-item-sub">Download directly from GitHub</div>
      </div>
      <button class="small primary" id="jk-auto-dl-btn">Download</button>
    </div>
    <div class="dialog-divider">— or upload a file —</div>
    <div class="upload-zone compact" id="guide-drop-zone">
      Drop file here or click to browse
      <input type="file" id="guide-file-input" accept=".txt,.csv">
    </div>`;

  document.getElementById('jk-auto-dl-btn').onclick = () => {
    dialog.close();
    downloadList(listId);
  };

  const zone   = document.getElementById('guide-drop-zone');
  const finput = document.getElementById('guide-file-input');
  zone.onclick     = () => finput.click();
  zone.ondragover  = e => { e.preventDefault(); zone.classList.add('drag-over'); };
  zone.ondragleave = () => zone.classList.remove('drag-over');
  zone.ondrop      = e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) { dialog.close(); ingestFile(file, listId); selectList(listId); }
  };
  finput.onchange = () => {
    if (finput.files[0]) { dialog.close(); ingestFile(finput.files[0], listId); selectList(listId); }
  };

  dialog.showModal();
}

function buildGuideHTML(listId, tmpl) {
  const screenshot = tmpl.screenshot?.() ?? '';

      <div class="guide-step-num">1</div>
      <div class="guide-step-body">

    </div>
    <div class="guide-step">
      <div class="guide-step-num">2</div>

        ${tmpl.downloadNote}

      </div>
    </div>
    <div class="guide-step">
      <div class="guide-step-num">3</div>
      <div class="guide-step-body">
        Come back here and drop the downloaded file:
        <div class="upload-zone compact" id="guide-drop-zone">
          Drop file here or click to browse
          <input type="file" id="guide-file-input" accept=".txt,.csv">
        </div>
      </div>
    </div>`;
}


// ─── Rescore rule management ──────────────────────────────────────────────────

function deleteRule(idx) {
  const list = getSelected();
  if (!list) return;
  list.rescoreRules.splice(idx, 1);
  updateCatchAll(list);
  persistMeta();
  renderRescoreSection();
  updateRescorePreview();
}

function saveRuleField(idx, field, value) {
  const list = getSelected();
  if (!list || !list.rescoreRules[idx]) return;
  list.rescoreRules[idx][field] = value;
  // User explicitly edited this rule — promote it from catch-all to regular rule
  delete list.rescoreRules[idx]._catchAll;
  const changed = updateCatchAll(list);
  persistMeta();
  if (changed) renderRescoreSection();
  updateRescorePreview();
}


function onRescoreInput() {
  document.querySelectorAll('.rule-in, .rule-len').forEach(el => {
    const v = el.value.trim();
    el.classList.toggle('invalid', v !== '' && parseRange(v) === null);
  });
  document.querySelectorAll('.rule-out').forEach(el => {
    const v = el.value.trim();
    el.classList.toggle('invalid', v !== '' && parseRuleOutput(v) === null);
  });
  updateRescorePreview();
}

function updateRescorePreview() {
  if (!scroller) return;
  const rules = Array.from(document.querySelectorAll('#rescore-rules .rule-row')).map(row => ({
    input:  row.querySelector('.rule-in')?.value  || '',
    length: row.querySelector('.rule-len')?.value || '',
    output: row.querySelector('.rule-out')?.value || '',
  }));
  scroller.setRescore(rules);
}

// ─── Rename ───────────────────────────────────────────────────────────────────

function startHeaderRename() {
  const list = getSelected();
  if (!list) return;
  const h2 = document.querySelector('.detail-header h2');
  if (!h2 || h2.querySelector('input')) return;

  const input = document.createElement('input');
  input.className = 'name-edit-input';
  input.value = list.name;

  const originalName = list.name;
  h2.textContent = '';
  h2.appendChild(input);
  input.select();

  let done = false;
  function commit() {
    if (done) return;
    done = true;
    const newName = input.value.trim() || originalName;
    h2.textContent = newName;
    if (newName !== originalName) {
      list.name = newName;
      persistMeta();
      renderLists();
    }
  }
  function cancel() {
    if (done) return;
    done = true;
    h2.textContent = originalName;
    const cardNameEl = document.querySelector(`.list-card[data-id="${CSS.escape(list.id)}"] .card-name`);
    if (cardNameEl && !cardNameEl.querySelector('input')) cardNameEl.textContent = originalName;
  }

  input.oninput = () => {
    const cardNameEl = document.querySelector(`.list-card[data-id="${CSS.escape(list.id)}"] .card-name`);
    if (cardNameEl && !cardNameEl.querySelector('input')) cardNameEl.textContent = input.value || originalName;
  };
  input.onblur = commit;
  input.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.onblur = null; cancel(); }
  };
}

function startCardRename(id) {
  const card = document.querySelector(`.list-card[data-id="${CSS.escape(id)}"]`);
  if (!card) return;
  const nameEl = card.querySelector('.card-name');
  if (!nameEl || nameEl.querySelector('input')) return;

  const list = state.lists.find(l => l.id === id);
  if (!list) return;

  const input = document.createElement('input');
  input.className = 'card-name-edit';
  input.value = list.name;

  const originalName = list.name;
  nameEl.textContent = '';
  nameEl.appendChild(input);
  input.focus();
  input.select();

  let done = false;
  function commit() {
    if (done) return;
    done = true;
    const newName = input.value.trim() || originalName;
    if (newName !== originalName) {
      list.name = newName;
      persistMeta();
      renderLists();
      if (state.selectedId === id) {
        const h2 = document.querySelector('.detail-header h2');
        if (h2 && !h2.querySelector('input')) h2.textContent = newName;
      }
    } else {
      nameEl.textContent = originalName;
    }
  }
  function cancel() {
    if (done) return;
    done = true;
    nameEl.textContent = originalName;
    const h2 = document.querySelector('.detail-header h2');
    if (h2 && !h2.querySelector('input')) h2.textContent = originalName;
  }

  input.oninput = () => {
    const h2 = document.querySelector('.detail-header h2');
    if (h2 && !h2.querySelector('input')) h2.textContent = input.value || originalName;
  };
  input.onclick = e => e.stopPropagation();
  input.onblur = commit;
  input.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { input.onblur = null; cancel(); }
  };
}

// ─── Boot ─────────────────────────────────────────────────────────────────────

initDarkMode();
init();
